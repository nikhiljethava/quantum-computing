[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "foundry-core"
version = "0.1.0"
description = "Shared quantum library for GCP Quantum Foundry: circuit generation, explainers, assessment heuristics, architecture mapping, and storage/job abstractions."
requires-python = ">=3.11"
dependencies = [
    "cirq-core>=1.3.0",
    "numpy>=1.26.0",
    "pydantic>=2.6.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
python_version = "3.11"
strict = true
