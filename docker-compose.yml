services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-foundry}
      POSTGRES_USER: ${POSTGRES_USER:-foundry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foundry_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foundry -d foundry"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql+asyncpg://foundry:foundry_dev_password@postgres:5432/foundry}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      JOB_BACKEND: ${JOB_BACKEND:-local}
      ARTIFACT_DIR: ${DOCKER_ARTIFACT_DIR:-/app/artifacts}
      GCS_BUCKET: ${GCS_BUCKET:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS_STR: ${CORS_ORIGINS_STR:-http://localhost:3000,http://localhost:3001}
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend:/app
      - ./packages/foundry-core:/foundry-core
      - artifact_store:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn foundry_backend.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql+asyncpg://foundry:foundry_dev_password@postgres:5432/foundry}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      JOB_BACKEND: ${JOB_BACKEND:-local}
      ARTIFACT_DIR: ${DOCKER_ARTIFACT_DIR:-/app/artifacts}
      GCS_BUCKET: ${GCS_BUCKET:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-2}
    volumes:
      - ./apps/worker:/app
      - ./packages/foundry-core:/foundry-core
      - artifact_store:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m foundry_worker.main

  frontend:
    build:
      context: apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev -- --hostname 0.0.0.0 --port 3000

volumes:
  postgres_data:
  artifact_store:
